<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#f0a500"/>
  <!-- Thermometer stem -->
  <rect x="12.5" y="4" width="5" height="17" rx="2.5" fill="white"/>
  <!-- Mercury fill -->
  <rect x="14" y="11" width="2" height="10" rx="1" fill="#e74c3c"/>
  <!-- Bulb -->
  <circle cx="15" cy="23" r="4.5" fill="#e74c3c"/>
  <circle cx="15" cy="23" r="4.5" fill="none" stroke="white" stroke-width="1.5"/>
  <!-- Sun circle -->
  <circle cx="24" cy="10" r="3.5" fill="white"/>
  <!-- Sun rays -->
  <line x1="24" y1="3.5" x2="24" y2="2"   stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="24" y1="17" x2="24" y2="18.5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="17.5" y1="10" x2="16" y2="10" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="30.5" y1="10" x2="32"  y2="10" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="19.4" y1="5.4" x2="18.3" y2="4.3" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="28.6" y1="14.6" x2="29.7" y2="15.7" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="28.6" y1="5.4" x2="29.7" y2="4.3" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="19.4" y1="14.6" x2="18.3" y2="15.7" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
</svg>
