<div class="landing-hero">
    @if (loading) {
    <div class="landing-spinner">
        <app-spinner></app-spinner>
    </div>
    } @else {
    <div class="hero-content fade-in-up">
        <div class="hero-icon-wrapper">
            <i class="bi bi-thermometer-sun hero-icon"></i>
        </div>
        <h1 class="hero-title">Klima</h1>
        <p class="hero-subtitle">Your real-time weather companion</p>
        <p class="hero-desc">
            Search any city in the world and instantly get current weather conditions &mdash;
            temperature, humidity, wind speed, and more.
        </p>
        <button class="btn-warm btn-hero" (click)="login()">
            <i class="bi bi-box-arrow-in-right"></i>
            Sign In to Get Started
        </button>
    </div>
    }
</div>
