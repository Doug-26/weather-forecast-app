<app-nav-bar></app-nav-bar>
@if (loading) {
<div class="text-center mt-5">
    <app-spinner></app-spinner>
</div>
} @else {
<div class="container mt-5 col-sm-6">
    <div class="text text-center px-lg-5">
        <i class="bi bi-cloud-sun-fill" style="font-size: 4rem; color: #f0a500;"></i>
        <h1 class="mt-3">Panapanahon</h1>
        <p class="lead">Your real-time weather companion.</p>
        <p class="small text-muted">Search any city in the world and instantly get the current weather conditions — temperature,
            humidity, wind speed, and more. Sign in to get started.</p>
    </div>
    <div class="text-center mt-4">
        <button class="sketch-button" (click)="login()">Sign In</button>
    </div>
</div>
}
